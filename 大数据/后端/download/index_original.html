<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>苹果耳机AI客服 - 下载</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ---- 背景动效 ---- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: #007AFF; top: -10%; left: -15%; opacity: 0.25; animation-delay: 0s; }
        .orb-2 { width: 260px; height: 260px; background: #5AC8FA; bottom: -12%; right: -12%; opacity: 0.2; animation-delay: -3s; }
        .orb-3 { width: 200px; height: 200px; background: #5856D6; top: 50%; left: 50%; opacity: 0.15; animation-delay: -6s; }
        .orb-4 { width: 180px; height: 180px; background: #34C759; top: 20%; right: 5%; opacity: 0.12; animation-delay: -2s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-15px, -50px) scale(0.9); }
            75% { transform: translate(-25px, 20px) scale(1.05); }
        }

        /* ---- AirPods 背景 ---- */
        .bg-airpods {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(520px, 85vw);
            pointer-events: none;
            z-index: 0;
            opacity: 0.07;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.04); }
        }

        /* ---- 主卡片 ---- */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 440px;
            width: 100%;
        }

        .card {
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 44px 32px 36px;
            text-align: center;
            box-shadow: 0 24px 72px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* ---- 状态栏 ---- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 199, 89, 0.15);
            border: 1px solid rgba(52, 199, 89, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            margin-bottom: 28px;
            font-size: 12px;
            color: #30D158;
            font-weight: 500;
        }
        .status-dot {
            width: 7px; height: 7px;
            background: #30D158;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ---- 图标 ---- */
        .icon-wrap {
            width: 88px;
            height: 88px;
            background: linear-gradient(145deg, #007AFF, #5856D6);
            border-radius: 22px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 36px rgba(0,122,255,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .icon-wrap svg { width: 48px; height: 48px; }

        /* ---- 文字 ---- */
        h1 {
            font-size: 24px;
            color: #FFFFFF;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        /* ---- 功能亮点 ---- */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.55);
        }
        .feature svg { width: 15px; height: 15px; opacity: 0.7; }

        /* ---- 信息卡片 ---- */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 32px;
        }
        .info-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px 12px;
            text-align: center;
            transition: background 0.2s;
        }
        .info-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .info-label {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 15px;
            color: #FFFFFF;
            font-weight: 600;
        }

        /* ---- 下载按钮 ---- */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 24px rgba(0,122,255,0.35);
            position: relative;
            overflow: hidden;
        }
        .download-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .download-btn:hover::after {
            transform: translateX(100%);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,122,255,0.45);
        }
        .download-btn:active {
            transform: scale(0.98);
        }
        .download-icon {
            width: 20px; height: 20px;
        }

        /* ---- 底部 ---- */
        .footer {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .footer-text {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            line-height: 1.6;
        }
        .footer-safety {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }

        /* ---- 响应式 ---- */
        @media (max-width: 480px) {
            .card { padding: 36px 22px 30px; border-radius: 24px; }
            h1 { font-size: 21px; }
            .info-grid { gap: 8px; }
            .download-btn { font-size: 16px; padding: 16px; }
        }
    </style>
</head>
