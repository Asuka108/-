# Nginx配置文件 - 菠萝耳机商城
# 部署位置: /etc/nginx/sites-available/after-sales-robot

server {
    listen 80;
    server_name _;  # 部署时替换为实际域名或IP

    # 重定向到HTTPS（可选）
    # return 301 https://$server_name$request_uri;

    # 日志配置
    access_log /var/log/nginx/after-sales-robot.access.log;
    error_log /var/log/nginx/after-sales-robot.error.log;

    # 客户端最大请求体大小（用于文件上传，含APK）
    client_max_body_size 50M;

    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # WebSocket代理（必须放最前面，优先匹配）
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API代理到FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Swagger文档
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # 静态文件（如果有前端资源）
    location /static/ {
        alias /var/www/after-sales-robot/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 默认路由（含 /admin/ /download/ 等由 FastAPI StaticFiles 处理）
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTPS配置（可选，需要SSL证书）
