<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人工客服工作台 - AirPods Assistant</title>
    <style>
        :root {
            --blue: #0071e3;
            --bg: #f5f5f7;
            --white: #ffffff;
            --text: #1d1d1f;
            --text2: #86868b;
            --red: #FF3B30;
            --green: #34C759;
            --orange: #FF9500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ 登录页 ============ */
        .login-page {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: var(--bg);
        }
        .login-box {
            background: var(--white);
            border-radius: 16px; padding: 48px 36px;
            width: 360px; text-align: center;
            box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0px;
        }
        .login-box h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .login-box .sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
        .login-box input {
            width: 100%; height: 48px; border: 1px solid #e5e5ea; border-radius: 10px;
            padding: 0 16px; font-size: 16px; margin-bottom: 12px; outline: none; background: #fafafa;
        }
        .login-box input:focus { border-color: var(--blue); background: #fff; }
        .login-box .btn {
            width: 100%; height: 48px; background: var(--blue); color: #fff;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.15s;
        }
        .login-box .btn:hover { background: #0077ed; }
        .login-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

        /* ============ 主面板 ============ */
        .main-panel { display: none; height: 100vh; flex-direction: column; }
        .main-panel.active { display: flex; }
        .login-page.hidden { display: none; }

        /* 顶栏 */
        .topbar {
            height: 48px; background: rgba(245,245,247,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; flex-shrink: 0;
        }
        .topbar .title { font-size: 14px; font-weight: 600; }
        .topbar .agent-info { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: var(--green); }
        .status-dot.busy { background: var(--orange); }
        .btn-logout { color: var(--red); cursor: pointer; font-size: 13px; border: none; background: none; }

        /* 内容区 */
        .content { display: flex; flex: 1; overflow: hidden; }

        /* 侧边栏 */
        .sidebar {
            width: 320px; background: var(--white);
            border-right: 1px solid #e5e5ea;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #e5e5ea; }
        .sidebar-tab {
            flex: 1; text-align: center; padding: 12px; font-size: 13px; font-weight: 500;
            cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .sidebar-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
        .sidebar-list .empty { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 13px; }

        .list-item {
            padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px;
            transition: background 0.15s; display: flex; justify-content: space-between; align-items: center;
        }
        .list-item:hover { background: #f5f5f7; }
        .list-item.active { background: rgba(0,113,227,0.08); }
        .list-item .name { font-size: 15px; font-weight: 500; }
        .list-item .info { font-size: 12px; color: var(--text2); }
        .list-item .badge {
            font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 500;
        }
        .badge.pending { background: rgba(255,149,0,0.12); color: var(--orange); }
        .badge.active { background: rgba(52,199,89,0.12); color: var(--green); }

        .btn-accept {
            padding: 5px 14px; background: var(--blue); color: #fff; border: none;
            border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer;
        }
        .btn-accept:hover { background: #0077ed; }

        /* 聊天区 */
        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg);
        }
        .chat-empty {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: var(--text2); font-size: 15px; flex-direction: column; gap: 8px;
        }
        .chat-active { flex: 1; display: none; flex-direction: column; }
        .chat-active.active { display: flex; }

        .chat-header {
            height: 52px; background: var(--white); border-bottom: 1px solid #e5e5ea;
            display: flex; align-items: center; padding: 0 20px; gap: 8px;
            font-size: 15px; font-weight: 500;
        }
        .btn-close-chat { margin-left: auto; color: var(--red); cursor: pointer; font-size: 13px; border: none; background: none; }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px;
        }
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .msg.user { align-self: flex-end; background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
        .msg.agent { align-self: flex-start; background: #e9e9eb; color: var(--text); border-bottom-left-radius: 4px; }
        .msg.system {
            align-self: center; background: transparent; color: var(--text2);
            font-size: 12px; padding: 4px 12px;
        }

        .chat-input-area {
            background: var(--white); border-top: 1px solid #e5e5ea;
            padding: 12px 20px; display: flex; gap: 10px;
        }
        .chat-input-area input {
            flex: 1; height: 42px; border: 1px solid #e5e5ea; border-radius: 21px;
            padding: 0 18px; font-size: 15px; outline: none; background: #fafafa;
        }
        .chat-input-area input:focus { border-color: var(--blue); }
        .chat-input-area button {
            height: 42px; padding: 0 22px; background: var(--blue); color: #fff;
            border: none; border-radius: 21px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .chat-input-area button:hover { background: #0077ed; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; }
            .chat-area { width: 100%; }
        }
    </style>
</head>
<body>

<!-- ============ 登录 ============ -->
<div class="login-page" id="loginPage">
    <div class="login-box">
        <h2>客服工作台</h2>
        <p class="sub">AirPods AI Assistant · 人工客服<br><span style="font-size:11px;color:#86868b;">与 Apple 官方无关，仅供学习使用</span></p>
        <input type="text" id="loginUser" placeholder="客服用户名" autocomplete="off">
        <input type="password" id="loginPass" placeholder="密码">
        <button class="btn" onclick="doLogin()">登 录</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- ============ 主面板 ============ -->
<div class="main-panel" id="mainPanel">
    <div class="topbar">
        <span class="title">人工客服工作台</span>
        <span style="font-size:11px;color:#86868b;">与 Apple 官方无关，仅供学习使用</span>
        <span class="agent-info">
            <span id="agentName">--</span>
            <span class="status-dot online" id="agentDot"></span>
            <span id="agentStatus">online</span>
            <button class="btn-logout" onclick="doLogout()">退出</button>
        </span>
    </div>

    <div class="content">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-tabs">
                <div class="sidebar-tab active" data-tab="requests" onclick="switchTab('requests')">转人工请求</div>
                <div class="sidebar-tab" data-tab="users" onclick="switchTab('users')">在线用户</div>
            </div>
            <div class="sidebar-list" id="sidebarList">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <!-- 聊天区 -->
        <div class="chat-area">
            <div class="chat-empty" id="chatEmpty">
                <span style="font-size:40px;">💬</span>
                <span>选择左侧用户或请求开始对话</span>
            </div>
            <div class="chat-active" id="chatActive">
                <div class="chat-header">
                    <span id="chatUserName">--</span>
                    <span style="font-size:12px;color:var(--text2);" id="chatConvId"></span>
                    <button class="btn-close-chat" onclick="closeChat()">结束对话</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div id="wsStatus" style="text-align:center;padding:6px;font-size:12px;background:#FFF3CD;color:#856404;display:none;"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()" disabled>
                    <button id="sendBtn" onclick="sendMsg()" disabled style="opacity:0.5;">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API = location.origin + '/api/v1/agent';
let agent = null;
let currentTab = 'requests';
let currentChat = null; // {conversation_id, user_id, username}
let ws = null;
let refreshTimer = null;
let pollTimer = null;
let lastMsgId = 0;

// ============== 登录 ==============
async function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    if (!username || !password) return showErr('请输入用户名和密码');

    try {
        const res = await fetch(API + '/login', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (!res.ok) { showErr(data.detail || '登录失败'); return; }

        agent = data;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainPanel').classList.add('active');
        document.getElementById('agentName').textContent = data.nickname || data.username;

        loadRequests();
        refreshTimer = setInterval(loadRequests, 10000);
    } catch(e) { showErr('网络错误'); }
}

function showErr(msg) {
    const el = document.getElementById('loginErr');
    el.textContent = msg; el.style.display = 'block';
}

// ============== 退出 ==============
async function doLogout() {
    if (agent) {
        await fetch(API + '/logout?agent_id=' + agent.id, {method:'POST'}).catch(()=>{});
    }
    if (ws) ws.close();
    clearInterval(refreshTimer);
    stopPoll();
    agent = null; currentChat = null;
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('mainPanel').classList.remove('active');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
}

// ============== 侧边栏切换 ==============
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    if (tab === 'requests') loadRequests();
    else loadUsers();
}

// ============== 加载转人工请求 ==============
async function loadRequests() {
    if (!agent) return;
    try {
        const res = await fetch(API + '/transfer-requests?status=pending');
        const data = await res.json();
        const list = document.getElementById('sidebarList');
        if (data.length === 0) {
            list.innerHTML = '<div class="empty">暂无转人工请求</div>';
        } else {
            list.innerHTML = data.map(r => `
                <div class="list-item">
                    <div>
                        <div class="name">${esc(r.nickname || r.username)}</div>
                        <div class="info">${esc(r.reason || '请求人工客服')} · ${r.created_at?.substr(11,5)||''}</div>
                    </div>
                    <button class="btn-accept" onclick="acceptRequest(${r.id},${r.conversation_id},${r.user_id},'${esc(r.nickname||r.username)}')">接入</button>
                </div>
            `).join('');
        }
    } catch(e) { console.error(e); }
}

// ============== 加载在线用户 ==============
async function loadUsers() {
    if (!agent) return;
    try {
        const res = await fetch(API + '/online-users');
        const data = await res.json();
        const list = document.getElementById('sidebarList');
        if (data.length === 0) {
            list.innerHTML = '<div class="empty">暂无在线用户</div>';
        } else {
            list.innerHTML = data.map(u => `
                <div class="list-item ${currentChat&&currentChat.conversation_id===u.conversation_id?'active':''}" onclick="openChat(${u.conversation_id},${u.user_id},'${esc(u.nickname||u.username)}')">
                    <div>
                        <div class="name">${esc(u.nickname || u.username)}</div>
                        <div class="info">最近活跃 ${u.last_active?.substr(11,5)||''}</div>
                    </div>
                </div>
            `).join('');
        }
    } catch(e) { console.error(e); }
}

// ============== 接单 ==============
async function acceptRequest(reqId, convId, userId, username) {
    try {
        const res = await fetch(API + '/transfer-requests/' + reqId + '/accept?agent_id=' + agent.id, {method:'POST'});
        if (res.ok) {
            document.getElementById('agentDot').className = 'status-dot busy';
            document.getElementById('agentStatus').textContent = 'busy';
            openChat(convId, userId, username);
            loadRequests();
        }
    } catch(e) { console.error(e); }
}

// ============== 打开聊天 ==============
async function openChat(convId, userId, username) {
    currentChat = { conversation_id: convId, user_id: userId, username };
    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatActive').classList.add('active');
    document.getElementById('chatUserName').textContent = username;
    document.getElementById('chatConvId').textContent = '#会话' + convId;

    // 加载历史
    try {
        const res = await fetch(API + '/conversations/' + convId + '/history');
        const data = await res.json();
        const msgs = document.getElementById('chatMessages');
        msgs.innerHTML = data.map(m => {
            let cls = m.role === 'user' ? 'user' : m.role === 'agent' ? 'agent' : 'system';
            if (m.id > lastMsgId) lastMsgId = m.id;
            return '<div class="msg ' + cls + '">' + esc(m.content) + '</div>';
        }).join('');
        msgs.scrollTop = msgs.scrollHeight;
    } catch(e) { console.error(e); }

    // 连接 WebSocket
    connectWS(convId);

    // 启动轮询拉取用户新消息
    startPoll(convId);

    if (currentTab === 'users') loadUsers();
}

// ============== 轮询拉取新消息 ==============
function startPoll(convId) {
    stopPoll();
    lastMsgId = lastMsgId || 0; // 保留初始加载的ID
    pollTimer = setInterval(async () => {
        try {
            const res = await fetch(API + '/conversations/' + convId + '/history');
            const data = await res.json();
            let hasNew = false;
            for (const m of data) {
                if (m.id > lastMsgId && m.role === 'user' && m.content) {
                    lastMsgId = m.id;
                    addMessage('user', m.content);
                    hasNew = true;
                }
            }
        } catch(e) {}
    }, 3000);
}

function stopPoll() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ============== WebSocket ==============
function setWSStatus(msg, type) {
    const el = document.getElementById('wsStatus');
    if (!msg) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.textContent = msg;
    el.style.background = type === 'ok' ? '#D4EDDA' : type === 'err' ? '#F8D7DA' : '#FFF3CD';
    el.style.color = type === 'ok' ? '#155724' : type === 'err' ? '#721C24' : '#856404';
}

function setInputEnabled(enabled) {
    document.getElementById('chatInput').disabled = !enabled;
    const btn = document.getElementById('sendBtn');
    btn.disabled = !enabled;
    btn.style.opacity = enabled ? '1' : '0.5';
}

function connectWS(convId) {
    if (ws) { try { ws.close(); } catch(e) {} }

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = proto + '//' + location.host + '/ws/chat/' + convId + '/agent';

    setWSStatus('正在连接...', 'warn');
    setInputEnabled(false);

    try {
        ws = new WebSocket(url);
    } catch(e) {
        setWSStatus('连接失败: ' + e.message, 'err');
        return;
    }

    ws.onopen = () => {
        setWSStatus('已连接', 'ok');
        setInputEnabled(true);
        setTimeout(() => setWSStatus('', ''), 2000);
    };

    ws.onmessage = (e) => {
        try {
            const msg = JSON.parse(e.data);
            if (msg.role && msg.content) {
                addMessage(msg.role, msg.content);
            }
        } catch(ex) {}
    };

    ws.onerror = (e) => {
        setWSStatus('连接错误，请检查网络', 'err');
    };

    ws.onclose = (e) => {
        setWSStatus('连接已断开', 'err');
        setInputEnabled(false);
        // 3秒后自动重连
        if (currentChat) {
            setTimeout(() => {
                if (currentChat && (!ws || ws.readyState > 1)) {
                    connectWS(currentChat.conversation_id);
                }
            }, 3000);
        }
    };
}

function addMessage(role, content) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : role === 'agent' ? 'agent' : 'system');
    div.textContent = content;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}

// ============== 发送消息 ==============
function sendMsg() {
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content || !currentChat) return;

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        setWSStatus('连接未就绪，正在重连...', 'warn');
        if (!ws || ws.readyState > 1) {
            connectWS(currentChat.conversation_id);
        }
        return;
    }

    ws.send(JSON.stringify({ content: content }));
    addMessage('agent', content);
    input.value = '';
}

// ============== 关闭聊天 ==============
function closeChat() {
    stopPoll();
    if (currentChat) {
        fetch(API + '/transfer-requests/by-conversation/' + currentChat.conversation_id + '/close', {method:'POST'}).catch(()=>{});
    }
    if (ws) ws.close();
    currentChat = null;
    lastMsgId = 0;
    document.getElementById('chatEmpty').style.display = 'flex';
    document.getElementById('chatActive').classList.remove('active');
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('agentDot').className = 'status-dot online';
    document.getElementById('agentStatus').textContent = 'online';
    loadRequests();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
